<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VLAB — Web to Silicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="logo">⚡ VLAB</span>
    <span class="logo-sub">Web to Silicon</span>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="editor">Éditeur</button>
    <button class="tab-btn" data-tab="analyser">Analyseur</button>
  </nav>
  <div class="topbar-right">
    <span id="conn-dot" class="conn-dot" title="WebSocket"></span>
  </div>
</header>

<div id="tab-editor" class="tab-panel active">
  <div class="pane pane-editor">
    <div class="pane-header">
      <span class="pane-title">main.cpp</span>
      <div class="target-group">
        <label class="pane-label">Cible</label>
        <select id="target-select" class="select">
          <option value="esp32">ESP32</option>
          <option value="stm32">STM32</option>
        </select>
        <button id="compile-btn" class="btn btn-primary">▶ Compiler</button>
      </div>
    </div>
    <div id="editor-container"></div>
  </div>

  <div class="pane pane-log">
    <div class="pane-header">
      <span class="pane-title">Build log</span>
      <div class="log-actions">
        <span id="step-counter" class="step-counter"></span>
        <button id="scroll-lock-btn" class="btn-icon btn-icon-active" title="Auto-scroll" aria-label="Auto-scroll">↓</button>
        <button id="copy-btn" class="btn-icon" title="Copier" aria-label="Copier">⎘</button>
        <button id="clear-btn" class="btn-icon" title="Effacer" aria-label="Effacer">✕</button>
      </div>
    </div>
    <div id="log-container" class="log-container"></div>
    <div id="status-bar" class="status-bar status-idle">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text">Prêt</span>
      <span id="line-count" class="line-count"></span>
    </div>
  </div>
</div>

<div id="tab-analyser" class="tab-panel">
  <div class="analyser-layout">
    <div class="pane pane-analyser-ctrl">
      <div class="pane-header">
        <span class="pane-title">Capture</span>
        <span id="capture-status" class="capture-badge"></span>
      </div>
      <div class="capture-controls">
        <div class="ctrl-row">
          <label class="pane-label">Fréquence</label>
          <select id="samplerate-select" class="select">
            <option value="20000">20 kHz</option>
            <option value="100000">100 kHz</option>
            <option value="1000000" selected>1 MHz</option>
            <option value="8000000">8 MHz</option>
            <option value="24000000">24 MHz</option>
          </select>
        </div>
        <div class="ctrl-row">
          <label class="pane-label">Samples</label>
          <input id="samples-input" type="number" class="input-num" value="10000" min="100" max="1000000" step="100"/>
        </div>
        <div class="ctrl-row">
          <label class="pane-label">Canaux</label>
          <div class="ch-grid">
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D0" checked/><span>D0</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D1" checked/><span>D1</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D2" checked/><span>D2</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D3" checked/><span>D3</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D4" checked/><span>D4</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D5" checked/><span>D5</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D6" checked/><span>D6</span></label>
            <label class="ch-pill"><input type="checkbox" class="ch-box" value="D7" checked/><span>D7</span></label>
          </div>
        </div>
        <div class="ctrl-row ctrl-row-btns">
          <button id="capture-btn" class="btn btn-primary">▶ Capturer</button>
          <button id="stop-btn" class="btn btn-danger" disabled>⬛ Stop</button>
        </div>
      </div>
      <div class="pane-header pane-header-secondary">
        <span class="pane-title">Log sigrok</span>
        <button id="clear-analyser-btn" class="btn-icon" aria-label="Effacer">✕</button>
      </div>
      <div id="analyser-log" class="log-container log-container-sm"></div>
    </div>

    <div class="pane pane-waveform">
      <div class="pane-header">
        <span class="pane-title">Diagramme de timing</span>
        <span id="sample-count" class="step-counter"></span>
      </div>
      <div id="waveform-container" class="waveform-container">
        <div class="waveform-empty">
          <p>Lance une capture pour voir les signaux</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="waveform-viewer.js"></script>
<script>require = { paths: { vs: '/monaco/vs' } };</script>
<script src="/monaco/vs/loader.js"></script>
<script src="client.js"></script>
</body>
</html>
